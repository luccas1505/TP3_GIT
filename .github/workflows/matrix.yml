name: Java Matrix

on:
  workflow_dispatch:

jobs:
  java-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [11, 17]

    steps:
      - name: Usar versão do Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}

      - name: Mostrar versão ativa
        run: java -version
